<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مترو یار خط ۶</title>
	<link rel="icon" href="favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        :root {
            --neon-pink: #ff5c00;
            --neon-blue: #ff007f;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Tahoma', sans-serif;
            background: #050505 url('109.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 480px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            max-height: 320px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
        }

        /* طراحی دکمه‌های گرد */
        .btn-station {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px;
            border-radius: 50px; 
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.85rem;
        }

        .btn-station:hover {
            background: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            color: white;
        }

        .result-panel {
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border-right: 4px solid var(--neon-pink);
            text-align: right;
            line-height: 1.8;
        }

        .highlight { color: var(--neon-blue); font-weight: bold; }
        .hidden { display: none; }
        h2 { text-shadow: 0 0 10px var(--neon-blue); }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title">مبدا را انتخاب کنید</h2>
    
    <div id="station-section" class="grid"></div>

    <div id="day-section" class="hidden">
        <button class="btn-station" style="width:100%; margin-bottom:10px" onclick="selectDay('روز عادی')">روز عادی (شنبه تا چهارشنبه)</button>
        <button class="btn-station" style="width:100%; margin-bottom:10px" onclick="selectDay('پنجشنبه')">پنجشنبه</button>
        <button class="btn-station" style="width:100%; margin-bottom:10px" onclick="selectDay('تعطیل رسمی')">تعطیل رسمی</button>
    </div>

    <div id="result-section" class="hidden">
        <div class="result-panel" id="result-text"></div>
        <button class="btn-station" style="width:100%; margin-top:20px; background: var(--neon-pink)" onclick="location.reload()">جستجوی جدید</button>
    </div>
</div>

<script>
    // لیست ایستگاه‌های خط ۶ طبق کد پایتون جدید
    const stations = {
        "شهيد آرمان": 1,
        "شهدای کن": 2,
        "شهران": 3,
        "شهرزيبا": 4,
        "آیت اله کاشانی": 5,
        "شهيد ستاري": 6,
        "اشرفي اصفهاني": 7,
        "يادگار امام": 8,
        "مرزداران": 9,
        "شهرك آزمايش": 10,
        "دانشگاه تربيت مدرس": 11,
        "كارگر": 12,
        "بوستان لاله": 13,
        "ميدان وليعصر (عج)": 14,
        "مریم مقدس(س)": 15,
        "شهداي هفتم تير": 16,
        "بهار شیراز": 17,
        "سربازوطن": 18,
        "امام حسين(ع)": 19,
        "ميدان شهدا": 20,
        "اميركبير": 21,
        "میدان خراسان": 22,
        "شهيد رضايي": 23,
        "بعثت": 24,
        "كيانشهر": 25,
        "دولت آباد": 26
    };

    let userSelection = { mabda: null, maghsad: null, day: null };

    // ساخت دکمه‌ها
    const grid = document.getElementById('station-section');
    Object.keys(stations).forEach(name => {
        let btn = document.createElement('button');
        btn.className = 'btn-station';
        btn.innerText = name;
        btn.onclick = () => handleSelect(name);
        grid.appendChild(btn);
    });

    function handleSelect(name) {
        if (!userSelection.mabda) {
            userSelection.mabda = name;
            document.getElementById('title').innerText = "مقصد را انتخاب کنید";
        } else {
            userSelection.maghsad = name;
            grid.classList.add('hidden');
            document.getElementById('day-section').classList.remove('hidden');
            document.getElementById('title').innerText = "نوع روز";
        }
    }

    async function selectDay(day) {
        userSelection.day = day;
        document.getElementById('day-section').classList.add('hidden');
        document.getElementById('title').innerText = "در حال محاسبه...";
        await startCalculation();
    }

    async function startCalculation() {
        const mIdx = stations[userSelection.mabda];
        const tIdx = stations[userSelection.maghsad];
        let folder = "";

        // منطق دقیق کد پایتون خط ۶ برای انتخاب پوشه
        // دقت کنید در کد پایتون برای تعطیل رسمی از پسوند _جمعه استفاده شده است
        if (tIdx >= mIdx) {
            if (userSelection.day === "پنجشنبه") folder = "شهیدآرمان_5";
            else if (userSelection.day === "تعطیل رسمی") folder = "شهیدآرمان_جمعه";
            else folder = "شهیدآرمان_عادی";
        } else {
            if (userSelection.day === "پنجشنبه") folder = "دولتآباد_5";
            else if (userSelection.day === "تعطیل رسمی") folder = "دولتآباد_جمعه";
            else folder = "دولتآباد_عادی";
        }

        try {
            // خواندن فایل‌ها
            const respMabda = await fetch(`${folder}/${mIdx}.txt`);
            const respMaghsad = await fetch(`${folder}/${tIdx}.txt`);
            
            if (!respMabda.ok || !respMaghsad.ok) throw new Error("File not found");

            const dataMabda = (await respMabda.text()).split('\n').map(Number);
            const dataMaghsad = (await respMaghsad.text()).split('\n').map(Number);

            displayResults(dataMabda, dataMaghsad);
        } catch (err) {
            // نمایش پیام خطا اگر فایل‌ها پیدا نشدند
            document.getElementById('result-text').innerHTML = `
                لطفا اتصال اینترنت خود را بررسی کنید
            `;
            document.getElementById('result-section').classList.remove('hidden');
        }
    }

    function displayResults(linesM, linesX) {
        const now = new Date();
        const nowMinutes = (now.getHours() * 60) + now.getMinutes();
        let resultDiv = document.getElementById('result-text');
        let found = false;

        for (let i = 0; i < linesM.length; i++) {
            let metro = linesM[i] - nowMinutes;
            
            // اگر زمان حرکت نگذشته باشد
            if (metro >= 0) {
                found = true;
                let sub1 = metro === 0 ? "به موقع رسیدی! درحال ورود!" : `قطار اول حدود <span class="highlight">${metro}</span> دقیقه دیگر به مبدا می‌رسد`;
                
                // فرمول پایتون: nmet - a + مترو
                let travelTime = linesX[i] - linesM[i];
                let arrive1 = `زمان احتمالی رسیدن به مقصد با قطار اول: <span class="highlight">${travelTime + metro}</span> دقیقه دیگر`;
                
                let sub2 = "دیر رسیدید قطار دومی درکار نیست🙃";
                let arrive2 = "";
                
                // بررسی قطار دوم
                if (linesM[i+1]) {
                    let nextMet = linesM[i+1] - nowMinutes;
                    sub2 = `قطار دوم حدود <span class="highlight">${nextMet}</span> دقیقه دیگر به مبدا می‌رسد`;
                    
                    let travelTime2 = linesX[i+1] - linesM[i+1];
                    arrive2 = `زمان احتمالی رسیدن به مقصد با قطار دوم: <span class="highlight">${travelTime2 + nextMet}</span> دقیقه دیگر`;
                }

                resultDiv.innerHTML = `
                    از ایستگاه <span class="highlight">${userSelection.mabda}</span> به <span class="highlight">${userSelection.maghsad}</span><br>
                    ------------------------------------------<br>
                    ${sub1}<br>${arrive1}<br><br>
                    ${sub2}<br>${arrive2}
                `;
                break;
            }
        }

        if (!found) {
            resultDiv.innerHTML = "دیر رسیدی پایان فعالیت خط🙃";
        }
        
        document.getElementById('result-section').classList.remove('hidden');
        document.getElementById('title').innerText = "زمان‌بندی حرکت";
    }
</script>
</body>
</html>
